/**:
    ros__parameters:
        feature_extract_enable: false
        point_filter_num: 3
        max_iteration: 3
        filter_size_surf: 0.4
        filter_size_map: 0.4
        cube_side_length: 1000.0
        runtime_pos_log_enable: false
        map_file_path: "./test.pcd"
        imu_insert_en: false
        px4_sitl_en: false
        semantic_mapping_en: false
        only_check_camera_params: false
        use_sim_time: false

        common:
            lid_topic:  "/livox/lidar"
            imu_topic:  "/livox/imu"
            time_sync_en: false
            time_offset_lidar_to_imu: 0.0

        preprocess:
            lidar_type: 1
            scan_line:  4
            blind: 0.5
            timestamp_unit: 3
            scan_rate: 10

        mapping:
            acc_cov: 0.1
            gyr_cov: 0.1
            b_acc_cov: 0.0001
            b_gyr_cov: 0.0001
            fov_degree:    360.0
            det_range:     100.0
            extrinsic_est_en:  false
            lidar_extrinsic_T: [ -0.011, -0.02329, 0.04412 ]
            lidar_extrinsic_R: [ 1., 0., 0.,
                                0., 1., 0.,
                                0., 0., 1.]
            imu_extrinsic_T: [ 0.0, 0.0, 0.0 ]
            imu_extrinsic_R: [ 1., 0., 0.,
                            0., 1., 0.,
                            0., 0., 1.]
            init_T: [ 0.0, 0.0, 0.0 ]
            init_R: [ 1., 0., 0.,
                    0., 1., 0.,
                    0., 0., 1.]
            camera_offset_T: [ 0.049, 0.29671, 0.01812 ]
            camera_offset_R: [ 0., 0., 1.,
                                1., 0., 0.,
                                0., 1., 0.]
            camera_fov_h: 60.0
            pixel_width: 640
            pixel_height: 640

        publish:
            path_en: false
            effect_map_en: false
            map_en: true
            scan_publish_en:  true
            dense_publish_en: true
            scan_bodyframe_pub_en: true

        pcd_save:
            pcd_save_en: false
            interval: -1
